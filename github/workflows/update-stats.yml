name: Update Language Stats

on:
  schedule:
    - cron: '0 0 * * *' # هر روز ساعت ۱۲ شب اجرا می‌شود
  workflow_dispatch: # اجازه می‌دهد دستی هم اجرایش کنی

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Language Stats
        uses: bybenpuls/github-language-stats@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: 'stats/languages.svg' # مسیر ذخیره فایل عکس
